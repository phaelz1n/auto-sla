<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto SLA - Gerador de Relatórios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tesseract.js para leitura OCR de imagens -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    
    <!-- Navbar -->
    <nav class="bg-blue-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-white font-bold text-xl tracking-wider">AUTO SLA</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-6 border-b pb-4">Gerar Novo SLA Operacional</h2>
                
                <form id="slaForm" enctype="multipart/form-data">
                    
                    <!-- Secao 1: Dados Basicos -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Logo do Cliente</label>
                            <input type="file" id="logo" name="logo" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition duration-150 ease-in-out cursor-pointer border border-gray-300 rounded-md">
                            <p class="mt-1 text-xs text-gray-500">Selecione a imagem que substituirá a tag {%logo} no Word.</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Mês de Referência</label>
                            <input type="text" id="mes" name="mes" placeholder="Ex: Mai/26" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Total de Rotas</label>
                            <input type="number" id="rotas" name="rotas" placeholder="Ex: 1771" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Total de Ocorrências</label>
                            <input type="number" id="ocorrencias" name="ocorrencias" placeholder="Ex: 2" required readonly class="w-full px-4 py-2 bg-gray-100 border border-gray-300 rounded-md text-gray-600 cursor-not-allowed">
                            <p class="mt-1 text-xs text-gray-500">Calculado automaticamente com base na lista abaixo.</p>
                        </div>
                    </div>

                    <!-- Secao 2: Lista de Ocorrencias -->
                    <div class="mb-8">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                            <h3 class="text-lg font-medium text-gray-900">Detalhamento de Ocorrências</h3>
                            <div class="flex gap-2 w-full sm:w-auto">
                                <!-- Botão de OCR -->
                                <div class="relative w-full sm:w-auto">
                                    <input type="file" id="ocrInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="handleOcrUpload(event)">
                                    <div class="px-4 py-2 bg-purple-50 text-purple-600 rounded-md hover:bg-purple-100 font-medium text-sm transition-colors border border-purple-200 flex items-center justify-center gap-2 h-full cursor-pointer">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
                                        </svg>
                                        <span id="ocrBtnText">Ler de um Print</span>
                                    </div>
                                </div>
                                <button type="button" onclick="addOcorrencia()" class="px-4 py-2 bg-green-50 text-green-600 rounded-md hover:bg-green-100 font-medium text-sm transition-colors border border-green-200 whitespace-nowrap">
                                    + Digitar Manual
                                </button>
                            </div>
                        </div>
                        
                        <div id="ocorrenciasList" class="space-y-4">
                            <!-- Items serão injetados aqui -->
                        </div>
                        <div id="emptyState" class="text-center py-6 bg-gray-50 border-2 border-dashed border-gray-300 rounded-lg text-gray-500 text-sm">
                            Nenhuma ocorrência registrada. O total será 0.
                        </div>
                    </div>

                    <!-- Hidden Input para enviar as ocorrências -->
                    <input type="hidden" id="detalhes_ocorrencias" name="detalhes_ocorrencias">

                    <!-- Submit -->
                    <div class="pt-6 border-t flex justify-end">
                        <button type="submit" id="submitBtn" class="px-6 py-3 bg-blue-600 text-white rounded-md hover:bg-blue-700 font-bold shadow-md transition-all flex items-center justify-center min-w-[200px]">
                            Gerar e Baixar SLA
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        let ocorrenciasData = [];

        function addOcorrencia() {
            const id = Date.now();
            ocorrenciasData.push({ id, numero: '', data: '', descricao: '', status: '' });
            renderOcorrencias();
            updateTotal();
        }

        function removeOcorrencia(id) {
            ocorrenciasData = ocorrenciasData.filter(o => o.id !== id);
            renderOcorrencias();
            updateTotal();
        }

        function updateOcorrencia(id, field, value) {
            const index = ocorrenciasData.findIndex(o => o.id === id);
            if (index !== -1) {
                ocorrenciasData[index][field] = value;
            }
        }

        function updateTotal() {
            document.getElementById('ocorrencias').value = ocorrenciasData.length;
        }

        function renderOcorrencias() {
            const list = document.getElementById('ocorrenciasList');
            const emptyState = document.getElementById('emptyState');
            
            list.innerHTML = '';
            
            if (ocorrenciasData.length === 0) {
                emptyState.style.display = 'block';
                return;
            } else {
                emptyState.style.display = 'none';
            }

            ocorrenciasData.forEach((oc, index) => {
                const row = document.createElement('div');
                row.className = 'p-4 bg-gray-50 rounded-lg border border-gray-200 relative';
                row.innerHTML = `
                    <button type="button" onclick="removeOcorrencia(${oc.id})" class="absolute top-2 right-2 text-red-500 hover:text-red-700 bg-red-50 rounded-full w-6 h-6 flex items-center justify-center font-bold">×</button>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Nº</label>
                            <input type="text" value="${oc.numero}" onchange="updateOcorrencia(${oc.id}, 'numero', this.value)" class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">Data</label>
                            <input type="text" value="${oc.data}" onchange="updateOcorrencia(${oc.id}, 'data', this.value)" placeholder="Ex: 19/05/2026" class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-medium text-gray-500 mb-1">Descrição</label>
                            <textarea rows="2" onchange="updateOcorrencia(${oc.id}, 'descricao', this.value)" class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500 focus:border-blue-500">${oc.descricao}</textarea>
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-medium text-gray-500 mb-1">Status / Resolução</label>
                            <textarea rows="2" onchange="updateOcorrencia(${oc.id}, 'status', this.value)" class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500 focus:border-blue-500">${oc.status}</textarea>
                        </div>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        // --- LÓGICA OCR COM TESSERACT.JS ---
        async function handleOcrUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const btnText = document.getElementById('ocrBtnText');
            const originalText = 'Ler de um Print';
            btnText.innerText = 'Lendo... 0%';

            try {
                // Roda o Tesseract localmente
                const result = await Tesseract.recognize(file, 'por', {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            btnText.innerText = `Lendo... ${Math.round(m.progress * 100)}%`;
                        }
                    }
                });
                
                const text = result.data.text;
                console.log("Texto extraído:", text); // Para depuração
                
                // Funcao auxiliar para capturar via RegEx
                const extract = (regex) => {
                    const match = text.match(regex);
                    return match ? match[1].trim() : '';
                };

                // Parsing baseado no padrão de WhatsApp
                const dataStr = extract(/Data:\s*(.+)/i);
                const empresa = extract(/Empresa:\s*(.+)/i);
                const rota = extract(/Rota:\s*(.+)/i);
                const motorista = extract(/Motorista:\s*(.+)/i);
                const impacto = extract(/Impacto:\s*(.+)/i);
                const tempoSocorro = extract(/Tempo de socorro:\s*(.+)/i);
                const responsavel = extract(/Operacional responsável:\s*(.+)/i);
                
                // O detalhe pode pegar várias linhas, então buscamos de "Detalhe do ocorrido" até "Operacional responsável" ou até o fim
                const detalheMatch = text.match(/Detalhe do ocorrido:\s*([\s\S]*?)(?:Operacional responsável:|$)/i);
                const detalhe = detalheMatch ? detalheMatch[1].trim() : '';

                // Montar o texto final das caixinhas
                let descParts = [];
                if (empresa) descParts.push(`Empresa: ${empresa}`);
                if (rota) descParts.push(`(Rota: ${rota})`);
                if (motorista) descParts.push(`- Motorista: ${motorista}`);
                const cabecalhoDesc = descParts.join(' ');
                
                const descricaoCompleta = cabecalhoDesc ? `${cabecalhoDesc}.\nDetalhe: ${detalhe}` : detalhe;

                let statusParts = [];
                if (impacto) statusParts.push(`Impacto: ${impacto}`);
                if (tempoSocorro) statusParts.push(`Tempo socorro: ${tempoSocorro}`);
                if (responsavel) statusParts.push(`(Resp: ${responsavel})`);
                
                const statusCompleto = statusParts.join(' - ');

                // Gera o novo card
                const id = Date.now();
                ocorrenciasData.push({
                    id,
                    numero: '',
                    data: dataStr || '',
                    descricao: descricaoCompleta.trim(),
                    status: statusCompleto.trim()
                });

                renderOcorrencias();
                updateTotal();
                
            } catch (e) {
                console.error(e);
                alert('Erro ao processar a imagem. O print precisa estar nítido e seguir o padrão.');
            } finally {
                btnText.innerText = originalText;
                event.target.value = ''; // Reseta para permitir o mesmo arquivo de novo
            }
        }

        document.getElementById('slaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Preparar a lista (remover o id que usamos apenas no frontend)
            const cleanList = ocorrenciasData.map(({ id, ...rest }) => rest);
            document.getElementById('detalhes_ocorrencias').value = JSON.stringify(cleanList);
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Gerando...';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            const formData = new FormData(e.target);

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // Download the file
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    
                    // Pegar o nome do arquivo dos headers se possivel
                    const contentDisposition = response.headers.get('content-disposition');
                    let filename = 'SLA_Operacional.docx';
                    if (contentDisposition && contentDisposition.indexOf('attachment') !== -1) {
                        const matches = /filename="([^"]+)"/.exec(contentDisposition);
                        if (matches != null && matches[1]) filename = matches[1];
                    }

                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    alert("SLA Gerado com sucesso!");
                } else {
                    const err = await response.text();
                    alert("Erro ao gerar o SLA: " + err);
                }
            } catch (error) {
                console.error(error);
                alert("Erro de conexão ao gerar SLA.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });

        // Init
        updateTotal();
    </script>
</body>
</html>
